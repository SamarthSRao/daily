function coStyle(id){
  const c=CO_COLORS[id]||{};
  return `background:${c.bg||''};color:${c.color||''}`;
}
function coDot(id){
  const c=CO_COLORS[id]||{};
  return `<span class="co-dot" style="background:${c.dot||'#888'}" title="${id}"></span>`;
}
function lcLink(lc){
  if(!lc) return '';
  return `<a class="lc-btn" href="https://leetcode.com/problems/${lc}" target="_blank">LC <i class="ti ti-external-link" style="font-size:10px" aria-hidden="true"></i></a>`;
}

function filterProblems(arr, co){
  if(co==='all') return arr;
  return arr.filter(p=>p.co.includes(co));
}

function renderProbCard(p){
  const dots = p.co.map(c=>coDot(c)).join('');
  return `<div class="prob-card">
    <span class="prob-id">${p.id}</span>
    <div class="prob-body">
      <div class="prob-title">${p.title}</div>
      <div class="prob-meta">
        <span class="badge diff-${p.diff}">${p.diff==='D'?'Design':p.diff==='E'?'Easy':p.diff==='M'?'Medium':'Hard'}</span>
        <span class="pattern-tag">${p.pattern}</span>
        ${lcLink(p.lc)}
        <span class="co-dots">${dots}</span>
      </div>
    </div>
  </div>`;
}

function countFiltered(co){
  let n=0;
  const l1=filterProblems(PROBLEMS.L1,co).length;
  let l2=0; Object.values(PROBLEMS.L2).forEach(a=>{l2+=filterProblems(a,co).length;});
  let l3=0; Object.values(PROBLEMS.L3).forEach(a=>{l3+=filterProblems(a,co).length;});
  const l4=filterProblems(PROBLEMS.L4,co).length;
  return {l1,l2,l3,l4,total:l1+l2+l3+l4};
}

function renderSection(title,problems,levelKey){
  const fp=filterProblems(problems,activeCo);
  if(!fp.length) return '';
  const open=openSections[levelKey];
  return `<div class="sub-section">
    <div class="sub-title">${title} <span style="font-weight:400;letter-spacing:0">(${fp.length})</span></div>
    <div class="prob-grid">${fp.map(p=>renderProbCard(p)).join('')}</div>
  </div>`;
}

function renderLevelBlock(key,label,desc,color){
  const open=openSections[key];
  let inner='';
  if(key==='L1'){
    const fp=filterProblems(PROBLEMS.L1,activeCo);
    if(!fp.length) return '';
    inner=`<div class="prob-grid">${fp.map(p=>renderProbCard(p)).join('')}</div>`;
  } else if(key==='L4'){
    const fp=filterProblems(PROBLEMS.L4,activeCo);
    if(!fp.length) return '';
    inner=`<div class="prob-grid">${fp.map(p=>renderProbCard(p)).join('')}</div>`;
  } else {
    const dict=PROBLEMS[key];
    inner=Object.entries(dict).map(([sub,arr])=>renderSection(sub,arr,key)).join('');
    if(!inner.trim()) return '';
  }
  const totalInLevel = key==='L1'?filterProblems(PROBLEMS.L1,activeCo).length
    :key==='L4'?filterProblems(PROBLEMS.L4,activeCo).length
    :Object.values(PROBLEMS[key]).reduce((s,a)=>s+filterProblems(a,activeCo).length,0);
  return `<div class="level-section">
    <div class="ls-hdr" onclick="toggleSection('${key}')">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></span>
      <span class="ls-title">${label}</span>
      <span class="ls-count">${totalInLevel} problems · ${desc}</span>
      <i class="ti ti-chevron-down ls-chevron${open?' open':''}" aria-hidden="true"></i>
    </div>
    ${open?`<div>${inner}</div>`:''}
  </div>`;
}

window.toggleSection=function(k){openSections[k]=!openSections[k];renderMain();}

function renderProblemsTab(){
  const c=countFiltered(activeCo);
  let html=`<div class="stats">
    <div class="stat"><div class="stat-n">${c.total}</div><div class="stat-l">Shown</div></div>
    <div class="stat"><div class="stat-n">${c.l1}</div><div class="stat-l">Level 1</div></div>
    <div class="stat"><div class="stat-n">${c.l2}</div><div class="stat-l">Level 2</div></div>
    <div class="stat"><div class="stat-n">${c.l3}</div><div class="stat-l">Level 3</div></div>
    <div class="stat"><div class="stat-n">${c.l4}</div><div class="stat-l">Level 4</div></div>
  </div>`;
  html+=renderLevelBlock('L1','Level 1 — Foundation','Hashing · Arrays · Basic Trees · Two Pointers','#1D9E75');
  html+=renderLevelBlock('L2','Level 2 — Synthesis','Graphs · Trees · Design · Binary Search · Sliding Window','#378ADD');
  html+=renderLevelBlock('L3','Level 3 — Optimization','Advanced Graph · Trie · DP · Segment Tree · LLD · Machine Coding','#EF9F27');
  html+=renderLevelBlock('L4','Level 4 — Architecture','Distributed Systems · Consensus · Idempotency · CRDT · WAL','#E24B4A');
  return html;
}

    </div>
    <div class="priority-steps">
      ${p.steps.map((s,i)=>`<div class="priority-step"><span class="step-num">${i+1}</span><span>${s}</span></div>`).join('')}

  </div>`).join('');

function renderToolbar(){
  const t=document.getElementById('navTabs');
  if(!t) return;
  t.innerHTML=TABS.map(tab=>`<button class="nav-tab${activeTab===tab.id?' active':''}" onclick="switchTab('${tab.id}')">${tab.label}</button>`).join('');
}

function renderMain(){
  const el=document.getElementById('mainContent');
  if(!el) return;
  let toolbar=`<div class="toolbar">
    <button class="pill co-all${activeCo==='all'?' on':''}" onclick="setCo('all')">All companies</button>
    <div class="divider"></div>
    ${Object.keys(CO_COLORS).map(id=>`<button class="pill co-${id}${activeCo===id?' on':''}" onclick="setCo('${id}')">${id.charAt(0).toUpperCase()+id.slice(1)}</button>`).join('')}
  </div>`;
  let body='';
  if(activeTab==='problems') body=renderProblemsTab();
  else if(activeTab==='paradigms') body=renderParadigmsTab();
  else if(activeTab==='formulas') body=renderFormulasTab();
  else if(activeTab==='lld') body=renderLLDTab();
  else if(activeTab==='priority') body=renderPriorityTab();
  el.innerHTML = toolbar + body;
}

window.switchTab=function(id){activeTab=id;renderToolbar();renderMain();}
window.setCo=function(id){activeCo=id;renderMain();}

renderToolbar();
renderMain();
